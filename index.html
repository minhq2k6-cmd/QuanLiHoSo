<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Hồ sơ Công chức - Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #004d40; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,.05); }
        .table thead { background-color: #e9ecef; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Hệ Thống Quản Lý Nhân Sự Cán Bộ</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-4">
                    <h4 class="mb-3 text-primary">Danh sách Hồ sơ Công chức (Dữ liệu từ SQL Server)</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Mã CCVC</th>
                                    <th>Họ và Tên</th>
                                    <th>Phòng ban</th>
                                    <th>Chức vụ</th>
                                    <th>Hệ số lương</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="employee-list">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
